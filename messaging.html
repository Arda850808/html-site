<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOS Pro V2 - Grup Sohbet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            padding: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            height: 90vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            font-size: 1.2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-users h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .user-item {
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-item:hover {
            background: #e8f0f9;
            transform: translateX(5px);
        }

        .user-item span {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #333;
        }

        .user-status {
            font-size: 0.75rem;
            color: #999;
            margin-top: 3px;
        }

        .status-online::before {
            content: '\25CF ';
            color: #2ecc71;
        }

        .status-offline::before {
            content: '\25CB ';
            color: #999;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .chat-subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .back-btn:hover, .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .message-bubble {
            max-width: min(60%, 460px);
            display: flex;
            flex-direction: column;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message.own .message-bubble {
            margin-left: auto;
        }

        .message-content {
            display: inline-block;
            width: max-content;
            max-width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            white-space: normal;
            word-break: normal;
            overflow-wrap: anywhere;
            writing-mode: horizontal-tb !important;
            text-orientation: mixed;
        }

        .message:not(.own) .message-content {
            background: #e8f0f9;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-user {
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 4px;
        }

        .message.own .message-user {
            color: #667eea;
            text-align: right;
        }

        .message-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 4px;
        }

        .message.own .message-time {
            text-align: right;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s ease;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.2);
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .no-messages {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 150px;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                flex-direction: row;
                overflow-x: auto;
            }

            .message-content {
                max-width: 100%;
            }

            .message-bubble {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                &#128101; Aktif &#220;yeler
            </div>
            <div class="online-users" id="online-users">
                <h3>Y&#252;kleniyor...</h3>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div>
                    <div class="chat-title">Grup Sohbet</div>
                    <div class="chat-subtitle" id="group-info">Y&#252;kleniyor...</div>
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="back-btn" onclick="goBack()">&#9664; Geri</button>
                    <button class="logout-btn" onclick="logout()">&#199;&#305;k&#305;&#351;</button>
                </div>
            </div>

            <div class="messages-container" id="messages-container">
                <div class="no-messages">Mesaj yok. &#304;lk mesaj&#305; yazarak ba&#351;la!</div>
            </div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Mesaj&#305;n&#305; yaz..." />
                <button onclick="sendMessage()">G&#246;nder</button>
            </div>
        </div>
    </div>

    <script type="module">
        const ROOM_NAME = 'nexusos-pro-v2-global-chat-room';
        const LEGACY_MESSAGES_KEY = 'nexusOS_messages';
        const CACHE_MESSAGES_KEY = 'nexusOS_messages_cache';
        const MIGRATION_FLAG_KEY = 'nexusOS_messages_migrated_v3';
        const PRESENCE_TIMEOUT_MS = 12000;
        const MAX_MESSAGES = 300;

        const messagesContainer = document.getElementById('messages-container');
        const onlineUsersDiv = document.getElementById('online-users');
        const groupInfoEl = document.getElementById('group-info');
        const messageInput = document.getElementById('message-input');

        let currentUser = '';
        let provider = null;
        let ydoc = null;
        let yMessages = null;
        let awareness = null;
        let syncTickHandle = null;

        function getCurrentUser() {
            return sessionStorage.getItem('nexusOS_loggedUser') || localStorage.getItem('nexusOS_loggedUser');
        }

        function checkUserLogin() {
            const loggedUser = getCurrentUser();
            if (!loggedUser) {
                window.location.href = 'index.html';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function normalizeMessageText(text) {
            if (typeof text !== 'string') return '';
            let normalized = text.replace(/\r\n?/g, '\n').trim();

            // s\ne\nl\na\nm gibi satir satir bozuk mesajlari temizle
            if (/^(?:\s*\S\s*\n){2,}\s*\S\s*$/u.test(normalized)) {
                normalized = normalized.replace(/\s*\n+\s*/g, '');
            }

            // s e l a m gibi tek harfli parcalari birlestir
            const tokens = normalized.split(/\s+/u).filter(Boolean);
            if (tokens.length >= 4) {
                const singleCharRatio = tokens.filter(token => token.length === 1).length / tokens.length;
                if (singleCharRatio >= 0.8) {
                    normalized = tokens.join('');
                }
            }

            return normalized;
        }

        function createMessageId() {
            return `msg_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
        }

        function sanitizeMessage(rawMessage) {
            if (!rawMessage || typeof rawMessage !== 'object') return null;
            const user = typeof rawMessage.user === 'string' ? rawMessage.user.trim() : '';
            const text = normalizeMessageText(rawMessage.text);
            const timestamp = Number(rawMessage.timestamp) || Date.now();
            const id = typeof rawMessage.id === 'string' && rawMessage.id
                ? rawMessage.id
                : `legacy_${timestamp}_${Math.random().toString(36).slice(2, 8)}`;

            if (!user || !text) return null;
            return { id, user, text, timestamp };
        }

        function getDedupedMessages(messages) {
            const uniqueById = new Map();
            for (const rawMessage of messages) {
                const msg = sanitizeMessage(rawMessage);
                if (!msg) continue;

                const existing = uniqueById.get(msg.id);
                if (!existing || msg.timestamp > existing.timestamp) {
                    uniqueById.set(msg.id, msg);
                }
            }

            return [...uniqueById.values()]
                .sort((a, b) => a.timestamp - b.timestamp)
                .slice(-MAX_MESSAGES);
        }

        function renderMessages(messages) {
            if (!messages.length) {
                messagesContainer.innerHTML = '<div class="no-messages">Mesaj yok. &#304;lk mesaj&#305; yazarak ba&#351;la!</div>';
                return;
            }

            messagesContainer.innerHTML = messages.map(msg => `
                <div class="message ${msg.user === currentUser ? 'own' : ''}">
                    <div class="message-bubble">
                        <div class="message-user">${escapeHtml(msg.user)}</div>
                        <div class="message-content">${escapeHtml(msg.text)}</div>
                        <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString('tr-TR')}</div>
                    </div>
                </div>
            `).join('');

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function renderOnlineUsers() {
            if (!awareness) return;
            const now = Date.now();
            const onlineUserMap = new Map();

            for (const state of awareness.getStates().values()) {
                const user = state && state.user;
                if (!user || !user.name) continue;

                const lastSeen = Number(user.lastSeen) || 0;
                if (now - lastSeen > PRESENCE_TIMEOUT_MS) continue;
                onlineUserMap.set(user.name, user.lastSeen);
            }

            const onlineUsers = [...onlineUserMap.keys()].sort((a, b) => a.localeCompare(b, 'tr'));
            if (!onlineUsers.length) {
                onlineUsersDiv.innerHTML = '<h3>Kimse &#231;evrimi&#231;i de&#287;il</h3>';
                updateGroupInfo(0);
                return;
            }

            onlineUsersDiv.innerHTML = '<h3>&#199;evrimi&#231;i</h3>' + onlineUsers.map(user => `
                <div class="user-item">
                    <span>${escapeHtml(user)}</span>
                    <div class="user-status status-online">&#199;evrimi&#231;i</div>
                </div>
            `).join('');

            updateGroupInfo(onlineUsers.length);
        }

        function updateGroupInfo(onlineCount) {
            groupInfoEl.textContent = `Kullan\u0131c\u0131: ${currentUser} | \u00c7evrimi\u00e7i: ${onlineCount}`;
        }

        function updateLocalPresence() {
            if (!awareness || !currentUser) return;
            awareness.setLocalStateField('user', {
                name: currentUser,
                lastSeen: Date.now()
            });
        }

        function persistCache(messages) {
            localStorage.setItem(CACHE_MESSAGES_KEY, JSON.stringify(messages));
        }

        function seedFromLegacyStorage() {
            if (!yMessages) return;
            const migrated = localStorage.getItem(MIGRATION_FLAG_KEY) === '1';

            const cachedMessages = JSON.parse(localStorage.getItem(CACHE_MESSAGES_KEY) || '[]');
            const legacyMessages = JSON.parse(localStorage.getItem(LEGACY_MESSAGES_KEY) || '[]');
            const seedMessages = getDedupedMessages([...cachedMessages, ...legacyMessages]);
            if (!seedMessages.length) {
                if (!migrated) {
                    localStorage.setItem(MIGRATION_FLAG_KEY, '1');
                }
                return;
            }

            const existingIds = new Set(getDedupedMessages(yMessages.toArray()).map(msg => msg.id));
            const newMessages = seedMessages.filter(msg => !existingIds.has(msg.id));

            if (newMessages.length) {
                ydoc.transact(() => {
                    yMessages.push(newMessages);
                });
            }

            localStorage.setItem(MIGRATION_FLAG_KEY, '1');
        }

        function refreshMessagesFromRealtime() {
            if (!yMessages) return;
            const messages = getDedupedMessages(yMessages.toArray());
            renderMessages(messages);
            persistCache(messages);
        }

        function sendMessage() {
            if (!yMessages) return;
            const messageText = normalizeMessageText(messageInput.value);
            if (!messageText) return;

            const message = {
                id: createMessageId(),
                user: currentUser,
                text: messageText,
                timestamp: Date.now()
            };

            ydoc.transact(() => {
                yMessages.push([message]);
            });

            messageInput.value = '';
            refreshMessagesFromRealtime();
        }

        function goBack() {
            window.location.href = 'dashboard/home.html';
        }

        function logout() {
            try {
                awareness && awareness.setLocalState(null);
                syncTickHandle && clearInterval(syncTickHandle);
                provider && provider.destroy();
                ydoc && ydoc.destroy();
            } catch (_) {
                // no-op
            }

            sessionStorage.removeItem('nexusOS_loggedUser');
            localStorage.removeItem('nexusOS_loggedUser');
            window.location.href = 'index.html';
        }

        function bindUIEvents() {
            messageInput.addEventListener('keypress', event => {
                if (event.key === 'Enter') {
                    sendMessage();
                }
            });
        }

        function renderFromCacheWhileConnecting() {
            const cachedMessages = JSON.parse(localStorage.getItem(CACHE_MESSAGES_KEY) || '[]');
            const messages = getDedupedMessages(cachedMessages);
            renderMessages(messages);
            onlineUsersDiv.innerHTML = '<h3>Ba\u011flan\u0131yor...</h3>';
            updateGroupInfo(0);
        }

        function startLocalFallback(error) {
            console.error('Gercek zamanli baglanti kurulamadi, cache modu aktif.', error);

            const fallbackMessages = getDedupedMessages(JSON.parse(localStorage.getItem(CACHE_MESSAGES_KEY) || '[]'));
            renderMessages(fallbackMessages);
            onlineUsersDiv.innerHTML = '<h3>Sunucuya ba\u011flan\u0131lamad\u0131</h3>';
            updateGroupInfo(0);

            window.sendMessage = function sendMessageFallback() {
                const messageText = normalizeMessageText(messageInput.value);
                if (!messageText) return;

                const message = {
                    id: createMessageId(),
                    user: currentUser,
                    text: messageText,
                    timestamp: Date.now()
                };

                const currentMessages = getDedupedMessages(JSON.parse(localStorage.getItem(CACHE_MESSAGES_KEY) || '[]'));
                currentMessages.push(message);
                const deduped = getDedupedMessages(currentMessages);
                persistCache(deduped);
                renderMessages(deduped);
                messageInput.value = '';
            };
        }

        async function initRealtime() {
            currentUser = getCurrentUser();
            renderFromCacheWhileConnecting();
            bindUIEvents();

            const [Y, { WebrtcProvider }] = await Promise.all([
                import('https://cdn.jsdelivr.net/npm/yjs@13.6.19/+esm'),
                import('https://cdn.jsdelivr.net/npm/y-webrtc@10.3.0/+esm')
            ]);

            ydoc = new Y.Doc();
            provider = new WebrtcProvider(ROOM_NAME, ydoc, {
                signaling: [
                    'wss://signaling.yjs.dev',
                    'wss://y-webrtc-signaling-eu.herokuapp.com',
                    'wss://y-webrtc-signaling-us.herokuapp.com'
                ]
            });

            yMessages = ydoc.getArray('messages');
            awareness = provider.awareness;

            seedFromLegacyStorage();
            refreshMessagesFromRealtime();

            yMessages.observe(() => {
                refreshMessagesFromRealtime();
            });

            awareness.on('change', () => {
                renderOnlineUsers();
            });

            provider.on('synced', () => {
                refreshMessagesFromRealtime();
                renderOnlineUsers();
            });

            updateLocalPresence();
            syncTickHandle = setInterval(() => {
                updateLocalPresence();
                renderOnlineUsers();
            }, 3000);

            window.addEventListener('beforeunload', () => {
                awareness.setLocalState(null);
                syncTickHandle && clearInterval(syncTickHandle);
                provider.destroy();
                ydoc.destroy();
            });

            window.sendMessage = sendMessage;
        }

        window.goBack = goBack;
        window.logout = logout;
        window.sendMessage = sendMessage;

        checkUserLogin();
        initRealtime().catch(error => {
            startLocalFallback(error);
        });
    </script>
</body>
</html>
