<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOS Pro V2 - Grup Sohbet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            padding: 20px;
        }

        .chat-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            height: 90vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            font-size: 1.2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-users h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .user-item {
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-item:hover {
            background: #e8f0f9;
            transform: translateX(5px);
        }

        .user-item span {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #333;
        }

        .user-status {
            font-size: 0.75rem;
            color: #999;
            margin-top: 3px;
        }

        .status-online::before {
            content: '\25CF ';
            color: #2ecc71;
        }

        .status-offline::before {
            content: '\25CB ';
            color: #999;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .chat-subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
        }

        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
        }

        .back-btn:hover, .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            animation: slideIn 0.3s ease-out;
        }

        .message-bubble {
            max-width: min(60%, 460px);
            display: flex;
            flex-direction: column;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message.own .message-bubble {
            margin-left: auto;
        }

        .message-content {
            display: inline-block;
            width: max-content;
            max-width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            white-space: normal;
            word-break: normal;
            overflow-wrap: anywhere;
            writing-mode: horizontal-tb !important;
            text-orientation: mixed;
        }

        .message:not(.own) .message-content {
            background: #e8f0f9;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-user {
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 4px;
        }

        .message.own .message-user {
            color: #667eea;
            text-align: right;
        }

        .message-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 0;
        }

        .message.own .message-time {
            text-align: right;
        }

        .message-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .message.own .message-actions {
            justify-content: flex-end;
        }

        .message-delete-btn {
            border: 1px solid #d0d5dd;
            background: #fff;
            color: #666;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .message-delete-btn:hover {
            border-color: #b3b8c0;
            color: #333;
            background: #f4f6f8;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s ease;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.2);
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .no-messages {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 150px;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                flex-direction: row;
                overflow-x: auto;
            }

            .message-content {
                max-width: 100%;
            }

            .message-bubble {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                &#128101; Aktif &#220;yeler
            </div>
            <div class="online-users" id="online-users">
                <h3>Y&#252;kleniyor...</h3>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div>
                    <div class="chat-title">Grup Sohbet</div>
                    <div class="chat-subtitle" id="group-info">Y&#252;kleniyor...</div>
                </div>
                <div id="chat-header-actions" style="display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end;">
                    <button class="back-btn" onclick="clearAllMessagesForCurrentUser()">Benden T&#252;m&#252;n&#252; Sil</button>
                    <button class="logout-btn" id="clear-all-global-btn" onclick="clearAllMessagesForEveryone()" style="display: none;">Herkesten T&#252;m&#252;n&#252; Sil</button>
                    <button class="back-btn" onclick="goBack()">&#9664; Geri</button>
                    <button class="logout-btn" onclick="logout()">&#199;&#305;k&#305;&#351;</button>
                </div>
            </div>

            <div class="messages-container" id="messages-container">
                <div class="no-messages">Mesaj yok. &#304;lk mesaj&#305; yazarak ba&#351;la!</div>
            </div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Mesaj&#305;n&#305; yaz..." />
                <button onclick="sendMessage()">G&#246;nder</button>
            </div>
        </div>
    </div>

        <script>
        const CHAT_STATE_READ_URL = 'https://api.jsonstorage.net/v1/json/5725bb31-8a05-4754-ba35-8f12024e78e4/73b2ac0c-2367-4546-8167-6e6972956763';
        const CHAT_STATE_WRITE_URL = 'https://api.jsonstorage.net/v1/json/5725bb31-8a05-4754-ba35-8f12024e78e4/73b2ac0c-2367-4546-8167-6e6972956763?apiKey=8969a471-87b7-4758-9f34-b090d396d9bb';

        const ADMIN_USERNAME = 'Arda';
        const ADMIN_PASSWORD = 'arda';
        const CACHE_STATE_KEY = 'nexusOS_chat_state_cache_v4';
        const HIDDEN_MESSAGES_STORAGE_PREFIX = 'nexusOS_hidden_messages_v1';
        const POLL_INTERVAL_MS = 1000;
        const HEARTBEAT_INTERVAL_MS = 7000;
        const PRESENCE_TIMEOUT_MS = 25000;
        const MAX_MESSAGES = 300;

        const messagesContainer = document.getElementById('messages-container');
        const onlineUsersDiv = document.getElementById('online-users');
        const groupInfoEl = document.getElementById('group-info');
        const messageInput = document.getElementById('message-input');
        const clearAllGlobalBtn = document.getElementById('clear-all-global-btn');

        let currentUser = '';
        let isCurrentUserAdmin = false;
        let localState = { messages: [], presence: {}, updatedAt: 0, lastWriter: '' };
        const pendingMessages = new Map();
        let hiddenMessageIds = new Set();
        let writeQueue = Promise.resolve();
        let pollHandle = null;
        let isPolling = false;
        let lastPresenceWriteAt = 0;

        function getCurrentUser() {
            return sessionStorage.getItem('nexusOS_loggedUser') || localStorage.getItem('nexusOS_loggedUser');
        }

        function checkUserLogin() {
            const loggedUser = getCurrentUser();
            if (!loggedUser) {
                window.location.href = 'index.html';
            }
        }

        function getStoredUsers() {
            try {
                return JSON.parse(localStorage.getItem('nexusOS_users') || '{}');
            } catch (_) {
                return {};
            }
        }

        function computeIsCurrentUserAdmin() {
            const sessionFlag = sessionStorage.getItem('nexusOS_isAdmin');
            if (sessionFlag === '1') return true;
            if (sessionFlag === '0') return false;

            const localFlag = localStorage.getItem('nexusOS_isAdmin');
            if (localFlag === '1') return true;

            const users = getStoredUsers();
            return currentUser === ADMIN_USERNAME && users[ADMIN_USERNAME] === ADMIN_PASSWORD;
        }

        function applyAdminControls() {
            if (!clearAllGlobalBtn) return;
            clearAllGlobalBtn.style.display = isCurrentUserAdmin ? 'inline-block' : 'none';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function normalizeMessageText(text) {
            if (typeof text !== 'string') return '';
            let normalized = text.replace(/\r\n?/g, '\n').trim();

            if (/^(?:\s*\S\s*\n){2,}\s*\S\s*$/u.test(normalized)) {
                normalized = normalized.replace(/\s*\n+\s*/g, '');
            }

            const tokens = normalized.split(/\s+/u).filter(Boolean);
            if (tokens.length >= 4) {
                const singleCharRatio = tokens.filter(token => token.length === 1).length / tokens.length;
                if (singleCharRatio >= 0.8) {
                    normalized = tokens.join('');
                }
            }

            return normalized;
        }

        function createMessageId() {
            return `msg_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
        }

        function sanitizeMessage(rawMessage) {
            if (!rawMessage || typeof rawMessage !== 'object') return null;

            const id = typeof rawMessage.id === 'string' && rawMessage.id
                ? rawMessage.id
                : `legacy_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;

            const user = typeof rawMessage.user === 'string' ? rawMessage.user.trim() : '';
            const text = normalizeMessageText(rawMessage.text);
            const timestamp = Number(rawMessage.timestamp) || Date.now();

            if (!user || !text) return null;
            return { id, user, text, timestamp };
        }

        function dedupeMessages(messages) {
            const byId = new Map();

            for (const rawMessage of messages) {
                const msg = sanitizeMessage(rawMessage);
                if (!msg) continue;

                const existing = byId.get(msg.id);
                if (!existing || msg.timestamp > existing.timestamp) {
                    byId.set(msg.id, msg);
                }
            }

            return [...byId.values()]
                .sort((a, b) => a.timestamp - b.timestamp)
                .slice(-MAX_MESSAGES);
        }

        function sanitizeState(rawState) {
            const safe = rawState && typeof rawState === 'object' ? rawState : {};
            const messages = Array.isArray(safe.messages) ? safe.messages : [];
            const presence = safe.presence && typeof safe.presence === 'object' ? safe.presence : {};

            const cleanPresence = {};
            Object.keys(presence).forEach(name => {
                const trimmed = String(name).trim();
                const lastSeen = Number(presence[name]) || 0;
                if (trimmed && lastSeen > 0) {
                    cleanPresence[trimmed] = lastSeen;
                }
            });

            return {
                messages: dedupeMessages(messages),
                presence: cleanPresence,
                updatedAt: Number(safe.updatedAt) || 0,
                lastWriter: typeof safe.lastWriter === 'string' ? safe.lastWriter : ''
            };
        }

        function cloneState(state) {
            return JSON.parse(JSON.stringify(state));
        }

        function persistCache(state) {
            localStorage.setItem(CACHE_STATE_KEY, JSON.stringify(state));
        }

        function loadCachedState() {
            const raw = JSON.parse(localStorage.getItem(CACHE_STATE_KEY) || '{}');
            return sanitizeState(raw);
        }

        function getHiddenMessagesStorageKey() {
            return `${HIDDEN_MESSAGES_STORAGE_PREFIX}_${currentUser || 'guest'}`;
        }

        function loadHiddenMessages() {
            const raw = JSON.parse(localStorage.getItem(getHiddenMessagesStorageKey()) || '[]');
            hiddenMessageIds = new Set(Array.isArray(raw) ? raw : []);
        }

        function persistHiddenMessages() {
            localStorage.setItem(getHiddenMessagesStorageKey(), JSON.stringify([...hiddenMessageIds]));
        }

        function hideMessageForCurrentUser(messageId) {
            if (!messageId) return;
            hiddenMessageIds.add(messageId);
            persistHiddenMessages();
            renderMessages(localState.messages);
        }

        function clearAllMessagesForCurrentUser() {
            for (const message of localState.messages) {
                hiddenMessageIds.add(message.id);
            }
            for (const message of pendingMessages.values()) {
                hiddenMessageIds.add(message.id);
            }
            persistHiddenMessages();
            renderMessages(localState.messages);
        }

        function clearAllMessagesForEveryone() {
            if (!isCurrentUserAdmin) return;

            const approved = window.confirm('Tüm sohbeti herkes için silmek istediğine emin misin?');
            if (!approved) return;

            pendingMessages.clear();
            hiddenMessageIds.clear();
            persistHiddenMessages();

            enqueueWrite(state => {
                state.messages = [];
                state.presence[currentUser] = Date.now();
                return state;
            });
        }

        function updateGroupInfo(onlineCount, statusText) {
            groupInfoEl.textContent = `Kullan\u0131c\u0131: ${currentUser} | \u00c7evrimi\u00e7i: ${onlineCount}${statusText ? ` | ${statusText}` : ''}`;
        }

        function renderMessages(messages) {
            const visibleMessages = messages.filter(msg => !hiddenMessageIds.has(msg.id));
            if (!visibleMessages.length) {
                messagesContainer.innerHTML = '<div class="no-messages">Mesaj yok. &#304;lk mesaj&#305; yazarak ba&#351;la!</div>';
                return;
            }

            messagesContainer.innerHTML = visibleMessages.map(msg => `
                <div class="message ${msg.user === currentUser ? 'own' : ''}">
                    <div class="message-bubble">
                        <div class="message-user">${escapeHtml(msg.user)}</div>
                        <div class="message-content">${escapeHtml(msg.text)}</div>
                        <div class="message-actions">
                            <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString('tr-TR')}</div>
                            ${msg.user === currentUser ? `<button class="message-delete-btn" data-delete-id="${encodeURIComponent(msg.id)}" type="button" title="Sadece senden silinir">Sil</button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function renderOnlineUsers(presenceMap, statusText) {
            const now = Date.now();
            const onlineUsers = Object.entries(presenceMap)
                .filter(([, lastSeen]) => now - Number(lastSeen) <= PRESENCE_TIMEOUT_MS)
                .map(([name]) => name)
                .sort((a, b) => a.localeCompare(b, 'tr'));

            if (!onlineUsers.length) {
                onlineUsersDiv.innerHTML = '<h3>Kimse &#231;evrimi&#231;i de&#287;il</h3>';
                updateGroupInfo(0, statusText);
                return;
            }

            onlineUsersDiv.innerHTML = '<h3>&#199;evrimi&#231;i</h3>' + onlineUsers.map(user => `
                <div class="user-item">
                    <span>${escapeHtml(user)}</span>
                    <div class="user-status status-online">&#199;evrimi&#231;i</div>
                </div>
            `).join('');

            updateGroupInfo(onlineUsers.length, statusText);
        }

        async function fetchRemoteState() {
            const response = await fetch(CHAT_STATE_READ_URL, {
                method: 'GET',
                cache: 'no-store'
            });

            if (!response.ok) {
                throw new Error(`Remote GET failed: ${response.status}`);
            }

            const raw = await response.json();
            return sanitizeState(raw);
        }

        async function pushRemoteState(state) {
            const response = await fetch(CHAT_STATE_WRITE_URL, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(state)
            });

            if (!response.ok) {
                throw new Error(`Remote PUT failed: ${response.status}`);
            }
        }

        function reconcileState(remoteState, statusText = '') {
            const remote = sanitizeState(remoteState);
            const remoteIds = new Set(remote.messages.map(msg => msg.id));

            for (const pendingId of [...pendingMessages.keys()]) {
                if (remoteIds.has(pendingId)) {
                    pendingMessages.delete(pendingId);
                }
            }

            const mergedMessages = dedupeMessages([...remote.messages, ...pendingMessages.values()]);

            localState = {
                ...remote,
                messages: mergedMessages
            };

            persistCache(localState);
            renderMessages(localState.messages);
            renderOnlineUsers(localState.presence, statusText);

            if (pendingMessages.size > 0) {
                flushPendingMessages();
            }
        }

        function enqueueWrite(mutator) {
            writeQueue = writeQueue
                .then(async () => {
                    let remote;
                    try {
                        remote = await fetchRemoteState();
                    } catch (_) {
                        remote = localState;
                    }

                    const base = sanitizeState(remote);
                    const next = sanitizeState(mutator(cloneState(base)) || base);
                    next.updatedAt = Date.now();
                    next.lastWriter = currentUser;

                    await pushRemoteState(next);
                    reconcileState(next, 'Buluta ba\u011fl\u0131');
                })
                .catch(error => {
                    console.error('Write queue error:', error);
                    renderOnlineUsers(localState.presence, 'Ba\u011flant\u0131 sorunu');
                });

            return writeQueue;
        }

        function flushPendingMessages() {
            if (pendingMessages.size === 0) return;

            enqueueWrite(state => {
                state.messages = dedupeMessages([...state.messages, ...pendingMessages.values()]);
                state.presence[currentUser] = Date.now();
                return state;
            });
        }

        function sendMessage() {
            const messageText = normalizeMessageText(messageInput.value);
            if (!messageText) return;

            const message = {
                id: createMessageId(),
                user: currentUser,
                text: messageText,
                timestamp: Date.now()
            };

            pendingMessages.set(message.id, message);
            localState.messages = dedupeMessages([...localState.messages, message]);
            renderMessages(localState.messages);
            messageInput.value = '';

            flushPendingMessages();
        }

        function writePresenceIfNeeded(force = false) {
            const now = Date.now();
            if (!force && now - lastPresenceWriteAt < HEARTBEAT_INTERVAL_MS) {
                return;
            }

            lastPresenceWriteAt = now;
            enqueueWrite(state => {
                state.presence[currentUser] = now;
                return state;
            });
        }

        async function pollRemoteState() {
            if (isPolling) return;
            isPolling = true;

            try {
                const remote = await fetchRemoteState();
                reconcileState(remote, 'Buluta ba\u011fl\u0131');
                writePresenceIfNeeded(false);
            } catch (error) {
                console.error('Poll error:', error);
                renderMessages(localState.messages);
                renderOnlineUsers(localState.presence, 'Ba\u011flant\u0131 sorunu');
            } finally {
                isPolling = false;
            }
        }

        function setupInputHandlers() {
            messageInput.addEventListener('keypress', event => {
                if (event.key === 'Enter') {
                    sendMessage();
                }
            });

            messagesContainer.addEventListener('click', event => {
                const deleteBtn = event.target.closest('.message-delete-btn');
                if (!deleteBtn) return;

                const encodedId = deleteBtn.getAttribute('data-delete-id') || '';
                let messageId = encodedId;
                try {
                    messageId = decodeURIComponent(encodedId);
                } catch (_) {
                    // no-op
                }

                hideMessageForCurrentUser(messageId);
            });
        }

        function goBack() {
            window.location.href = 'dashboard/home.html';
        }

        function logout() {
            sessionStorage.removeItem('nexusOS_loggedUser');
            sessionStorage.removeItem('nexusOS_isAdmin');
            localStorage.removeItem('nexusOS_loggedUser');
            localStorage.removeItem('nexusOS_isAdmin');
            window.location.href = 'index.html';
        }

        function initChat() {
            checkUserLogin();
            currentUser = getCurrentUser();
            isCurrentUserAdmin = computeIsCurrentUserAdmin();
            loadHiddenMessages();
            applyAdminControls();

            localState = loadCachedState();
            reconcileState(localState, 'Ba\u011flan\u0131yor...');

            setupInputHandlers();
            writePresenceIfNeeded(true);
            pollRemoteState();

            pollHandle = setInterval(() => {
                pollRemoteState();
            }, POLL_INTERVAL_MS);

            window.addEventListener('beforeunload', () => {
                if (pollHandle) {
                    clearInterval(pollHandle);
                }
            });
        }

        window.sendMessage = sendMessage;
        window.hideMessageForCurrentUser = hideMessageForCurrentUser;
        window.clearAllMessagesForCurrentUser = clearAllMessagesForCurrentUser;
        window.clearAllMessagesForEveryone = clearAllMessagesForEveryone;
        window.goBack = goBack;
        window.logout = logout;

        initChat();
    </script>

</body>
</html>
