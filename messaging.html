<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexusOS Pro V2 - Grup Sohbet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            padding: 20px;
            overflow-x: hidden;
        }

        .chat-container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            width: min(96vw, 1250px);
            max-width: 1250px;
            margin: 0 auto;
            display: flex;
            height: 90vh;
            overflow: hidden;
        }

        .sidebar {
            width: 250px;
            background: #f8f9fa;
            border-right: 1px solid #e0e0e0;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            font-size: 1.2rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .online-users h3 {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-weight: 600;
        }

        .user-item {
            padding: 10px;
            margin-bottom: 8px;
            background: white;
            border-radius: 8px;
            border-left: 3px solid #667eea;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .user-item:hover {
            background: #e8f0f9;
            transform: translateX(5px);
        }

        .user-item span {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            color: #333;
        }

        .user-status {
            font-size: 0.75rem;
            color: #999;
            margin-top: 3px;
        }

        .status-online::before {
            content: '\25CF ';
            color: #2ecc71;
        }

        .status-offline::before {
            content: '\25CB ';
            color: #999;
        }

        .role-admin-panel {
            margin-top: 14px;
            padding: 12px;
            background: #ffffff;
            border: 1px solid #dfe4f2;
            border-radius: 10px;
        }

        .role-admin-panel h3 {
            font-size: 0.85rem;
            text-transform: uppercase;
            color: #5b5f6d;
            margin-bottom: 6px;
        }

        .role-admin-panel p {
            font-size: 0.73rem;
            color: #7a7f8f;
            margin-bottom: 8px;
            line-height: 1.3;
        }

        .role-admin-panel label {
            display: block;
            font-size: 0.73rem;
            color: #5a6173;
            margin-bottom: 4px;
            font-weight: 600;
        }

        .role-admin-panel select {
            width: 100%;
            border: 1px solid #ccd3e5;
            border-radius: 8px;
            font-size: 0.82rem;
            padding: 7px 8px;
            margin-bottom: 8px;
            background: #fff;
        }

        .role-admin-panel .permission-check {
            display: flex;
            align-items: center;
            gap: 7px;
            font-size: 0.78rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: #4c5261;
        }

        .role-admin-panel .permission-check input {
            width: 14px;
            height: 14px;
            accent-color: #667eea;
        }

        .role-admin-panel button {
            width: 100%;
            border: none;
            border-radius: 8px;
            padding: 8px 10px;
            font-size: 0.82rem;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .role-admin-panel button:disabled {
            cursor: not-allowed;
            opacity: 0.55;
        }

        .role-admin-status {
            min-height: 16px;
            margin-top: 7px;
            font-size: 0.72rem;
            color: #5a6173;
        }

        .chat-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-bottom: 1px solid #e0e0e0;
            display: flex;
            flex-wrap: wrap;
            gap: 10px 12px;
            justify-content: space-between;
            align-items: flex-start;
        }

        .chat-header-main {
            min-width: 0;
            flex: 1 1 320px;
        }

        .chat-title {
            font-size: 1.3rem;
            font-weight: 600;
        }

        .chat-subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        #chat-header-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: flex-end;
            align-items: center;
            flex: 0 1 auto;
            max-width: 100%;
        }

        .back-btn, .logout-btn {
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: white;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .back-btn:hover, .logout-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafafa;
        }

        .message {
            display: flex;
            margin-bottom: 12px;
            min-width: 0;
        }

        .message-bubble {
            max-width: min(60%, 460px);
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .message.own {
            justify-content: flex-end;
        }

        .message.own .message-bubble {
            margin-left: auto;
        }

        .message-content {
            display: block;
            width: auto;
            max-width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-wrap: anywhere;
            writing-mode: horizontal-tb !important;
            text-orientation: mixed;
        }

        .message:not(.own) .message-content {
            background: #e8f0f9;
            color: #333;
            border-bottom-left-radius: 4px;
        }

        .message.own .message-content {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .message-user {
            font-size: 0.8rem;
            font-weight: 600;
            color: #666;
            margin-bottom: 4px;
        }

        .message.own .message-user {
            color: #667eea;
            text-align: right;
        }

        .message-time {
            font-size: 0.75rem;
            color: #999;
            margin-top: 0;
        }

        .message.own .message-time {
            text-align: right;
        }

        .message-actions {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 4px;
        }

        .message.own .message-actions {
            justify-content: flex-end;
        }

        .message-delete-btn {
            border: 1px solid #d0d5dd;
            background: #fff;
            color: #666;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .message-delete-btn:hover {
            border-color: #b3b8c0;
            color: #333;
            background: #f4f6f8;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-area {
            padding: 20px;
            background: white;
            border-top: 1px solid #e0e0e0;
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        .typing-indicator {
            min-height: 20px;
            padding: 2px 20px 8px;
            font-size: 0.85rem;
            color: #667eea;
            background: white;
            border-top: 1px solid #f0f1f5;
        }

        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 0.95rem;
            transition: border-color 0.2s ease;
        }

        .input-area input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.2);
        }

        .input-area button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .input-area button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .no-messages {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        @media (max-width: 768px) {
            .chat-container {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                height: auto;
                max-height: 150px;
                border-right: none;
                border-bottom: 1px solid #e0e0e0;
                flex-direction: row;
                overflow-x: auto;
            }

            .message-content {
                max-width: 100%;
            }

            .message-bubble {
                max-width: 80%;
            }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="sidebar">
            <div class="sidebar-header">
                &#128101; Aktif &#220;yeler
            </div>
            <div class="online-users" id="online-users">
                <h3>Y&#252;kleniyor...</h3>
            </div>
            <div class="role-admin-panel" id="role-admin-panel" style="display: none;">
                <h3>Rol ve Yetki Yonetimi</h3>
                <p>Bu alana sadece admin hesabi (Arda) erisebilir.</p>
                <label for="role-user-select">Kullanici</label>
                <select id="role-user-select"></select>
                <label for="role-select">Rol</label>
                <select id="role-select">
                    <option value="member">Uye</option>
                    <option value="moderator">Mod</option>
                    <option value="helper">Yardimci</option>
                </select>
                <label class="permission-check" for="perm-delete-own">
                    <input type="checkbox" id="perm-delete-own" />
                    Kendi mesajlarini silebilsin
                </label>
                <button type="button" id="role-save-btn">Rol ve Yetkiyi Kaydet</button>
                <div class="role-admin-status" id="role-status"></div>
            </div>
        </div>

        <div class="chat-main">
            <div class="chat-header">
                <div class="chat-header-main">
                    <div class="chat-title">Grup Sohbet</div>
                    <div class="chat-subtitle" id="group-info">Y&#252;kleniyor...</div>
                </div>
                <div id="chat-header-actions">
                    <button class="back-btn" id="clear-all-mine-btn" onclick="clearAllMessagesForCurrentUser()">Benden T&#252;m&#252;n&#252; Sil</button>
                    <button class="logout-btn" id="clear-all-global-btn" onclick="clearAllMessagesForEveryone()" style="display: none;">Herkesten T&#252;m&#252;n&#252; Sil</button>
                    <button class="back-btn" onclick="goBack()">&#9664; Geri</button>
                    <button class="logout-btn" onclick="logout()">&#199;&#305;k&#305;&#351;</button>
                </div>
            </div>

            <div class="messages-container" id="messages-container">
                <div class="no-messages">Mesaj yok. &#304;lk mesaj&#305; yazarak ba&#351;la!</div>
            </div>

            <div class="typing-indicator" id="typing-indicator"></div>

            <div class="input-area">
                <input type="text" id="message-input" placeholder="Mesaj&#305;n&#305; yaz..." />
                <button onclick="sendMessage()">G&#246;nder</button>
            </div>
        </div>
    </div>

        <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDrMEPFlUnZYro2ygYjNWb_n1VIN51v9sU",
            authDomain: "nexusos-9c84d.firebaseapp.com",
            projectId: "nexusos-9c84d",
            storageBucket: "nexusos-9c84d.firebasestorage.app",
            messagingSenderId: "165113413087",
            appId: "1:165113413087:web:0e39e1e2bcc19e3759d86a"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const stateDocRef = doc(db, "globalChat", "state");

        const ADMIN_USERNAME = 'Arda';
        const CACHE_STATE_KEY = 'nexusOS_chat_state_cache_v4';
        const HIDDEN_MESSAGES_STORAGE_PREFIX = 'nexusOS_hidden_messages_v1';
        const POLL_INTERVAL_MS = 4000;
        const HEARTBEAT_INTERVAL_MS = 7000;
        const PRESENCE_TIMEOUT_MS = 25000;
        const TYPING_TIMEOUT_MS = 2500;
        const TYPING_WRITE_THROTTLE_MS = 700;
        const MAX_MESSAGES = 300;
        const ROLE_ADMIN = 'admin';
        const ROLE_MODERATOR = 'moderator';
        const ROLE_HELPER = 'helper';
        const ROLE_MEMBER = 'member';
        const ROLE_LABELS = {
            [ROLE_ADMIN]: 'Admin',
            [ROLE_MODERATOR]: 'Mod',
            [ROLE_HELPER]: 'Yardimci',
            [ROLE_MEMBER]: 'Uye'
        };
        const ROLE_PERMISSIONS = {
            [ROLE_ADMIN]: {
                canManageRoles: true,
                canDeleteEveryone: true,
                canDeleteOwnMessages: true
            },
            [ROLE_MODERATOR]: {
                canManageRoles: false,
                canDeleteEveryone: false,
                canDeleteOwnMessages: true
            },
            [ROLE_HELPER]: {
                canManageRoles: false,
                canDeleteEveryone: false,
                canDeleteOwnMessages: true
            },
            [ROLE_MEMBER]: {
                canManageRoles: false,
                canDeleteEveryone: false,
                canDeleteOwnMessages: true
            }
        };

        const messagesContainer = document.getElementById('messages-container');
        const onlineUsersDiv = document.getElementById('online-users');
        const groupInfoEl = document.getElementById('group-info');
        const messageInput = document.getElementById('message-input');
        const typingIndicatorEl = document.getElementById('typing-indicator');
        const clearAllMineBtn = document.getElementById('clear-all-mine-btn');
        const clearAllGlobalBtn = document.getElementById('clear-all-global-btn');
        const roleAdminPanelEl = document.getElementById('role-admin-panel');
        const roleUserSelectEl = document.getElementById('role-user-select');
        const roleSelectEl = document.getElementById('role-select');
        const roleDeleteOwnEl = document.getElementById('perm-delete-own');
        const roleSaveBtn = document.getElementById('role-save-btn');
        const roleStatusEl = document.getElementById('role-status');

        let currentUser = '';
        let isCurrentUserAdmin = false;
        let currentUserPermissions = { ...ROLE_PERMISSIONS[ROLE_MEMBER] };
        let localState = {
            messages: [],
            presence: {},
            typing: {},
            roles: {},
            userPermissions: {},
            updatedAt: 0,
            lastWriter: ''
        };
        const pendingMessages = new Map();
        let hiddenMessageIds = new Set();
        let writeQueue = Promise.resolve();
        let pollHandle = null;
        let isPolling = false;
        let lastPresenceWriteAt = 0;
        let isCurrentUserTyping = false;
        let lastTypingWriteAt = 0;
        let typingStopTimer = null;

        function getCurrentUser() {
            return sessionStorage.getItem('nexusOS_loggedUser') || localStorage.getItem('nexusOS_loggedUser');
        }

        function checkUserLogin() {
            const loggedUser = getCurrentUser();
            if (!loggedUser) {
                window.location.href = 'index.html';
            }
        }

        function getStoredUsers() {
            try {
                return JSON.parse(localStorage.getItem('nexusOS_users') || '{}');
            } catch (_) {
                return {};
            }
        }

        function normalizeUsernameForCompare(username) {
            return String(username || '')
                .replace(/[\u200B-\u200D\uFEFF]/g, '')
                .trim()
                .normalize('NFKC')
                .toLocaleLowerCase('tr-TR');
        }

        function isAdminUsername(username) {
            return normalizeUsernameForCompare(username) === normalizeUsernameForCompare(ADMIN_USERNAME);
        }

        function normalizeRole(role) {
            const safeRole = String(role || '').toLowerCase().trim();
            if (safeRole === ROLE_MODERATOR) return ROLE_MODERATOR;
            if (safeRole === ROLE_HELPER) return ROLE_HELPER;
            return ROLE_MEMBER;
        }

        function findMatchingUsernameKey(mapValue, username) {
            const target = normalizeUsernameForCompare(username);
            if (!target || !mapValue || typeof mapValue !== 'object') return '';
            return Object.keys(mapValue).find(existingName =>
                normalizeUsernameForCompare(existingName) === target
            ) || '';
        }

        function getRolePermissions(role) {
            return { ...(ROLE_PERMISSIONS[normalizeRole(role)] || ROLE_PERMISSIONS[ROLE_MEMBER]) };
        }

        function getUserRole(username) {
            if (isAdminUsername(username)) return ROLE_ADMIN;
            const matchingRoleKey = findMatchingUsernameKey(localState.roles, username);
            if (!matchingRoleKey) return ROLE_MEMBER;
            return normalizeRole(localState.roles[matchingRoleKey]);
        }

        function getUserPermissionOverrides(username) {
            const matchingPermissionKey = findMatchingUsernameKey(localState.userPermissions, username);
            if (!matchingPermissionKey) return {};
            const permissions = localState.userPermissions[matchingPermissionKey];
            return permissions && typeof permissions === 'object' ? permissions : {};
        }

        function getUserPermissions(username) {
            if (isAdminUsername(username)) {
                return getRolePermissions(ROLE_ADMIN);
            }

            const rolePermissions = getRolePermissions(getUserRole(username));
            const overrides = getUserPermissionOverrides(username);
            if (typeof overrides.canDeleteOwnMessages === 'boolean') {
                rolePermissions.canDeleteOwnMessages = overrides.canDeleteOwnMessages;
            }

            // Non-admin users can never reach role-management controls.
            rolePermissions.canManageRoles = false;
            rolePermissions.canDeleteEveryone = false;
            return rolePermissions;
        }

        function refreshCurrentUserPermissions() {
            currentUserPermissions = getUserPermissions(currentUser);
        }

        function canCurrentUserManageRoles() {
            return isCurrentUserAdmin && isAdminUsername(currentUser) && Boolean(currentUserPermissions.canManageRoles);
        }

        function computeIsCurrentUserAdmin() {
            if (!isAdminUsername(currentUser)) return false;
            if (sessionStorage.getItem('nexusOS_isAdmin') === '1') return true;
            if (localStorage.getItem('nexusOS_isAdmin') === '1') return true;
            return false;
        }

        function applyAdminControls() {
            if (clearAllGlobalBtn) {
                clearAllGlobalBtn.style.display = currentUserPermissions.canDeleteEveryone ? 'inline-block' : 'none';
            }
            if (clearAllMineBtn) {
                clearAllMineBtn.style.display = currentUserPermissions.canDeleteOwnMessages ? 'inline-block' : 'none';
            }
        }

        function formatUserDisplayName(username) {
            const safeName = String(username || '').trim();
            if (!safeName) return '';
            const role = getUserRole(safeName);
            const roleLabel = ROLE_LABELS[role];
            if (!roleLabel || role === ROLE_MEMBER) return safeName;
            return `${safeName} [${roleLabel}]`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function normalizeMessageText(text) {
            if (typeof text !== 'string') return '';
            let normalized = text.replace(/\r\n?/g, '\n').trim();

            if (/^(?:\s*\S\s*\n){2,}\s*\S\s*$/u.test(normalized)) {
                normalized = normalized.replace(/\s*\n+\s*/g, '');
            }

            const tokens = normalized.split(/\s+/u).filter(Boolean);
            if (tokens.length >= 4) {
                const singleCharRatio = tokens.filter(token => token.length === 1).length / tokens.length;
                if (singleCharRatio >= 0.8) {
                    normalized = tokens.join('');
                }
            }

            return normalized;
        }

        function createMessageId() {
            return `msg_${Date.now()}_${Math.random().toString(36).slice(2, 10)}`;
        }

        function sanitizeMessage(rawMessage) {
            if (!rawMessage || typeof rawMessage !== 'object') return null;

            const id = typeof rawMessage.id === 'string' && rawMessage.id
                ? rawMessage.id
                : `legacy_${Date.now()}_${Math.random().toString(36).slice(2, 8)}`;

            const user = typeof rawMessage.user === 'string' ? rawMessage.user.trim() : '';
            const text = normalizeMessageText(rawMessage.text);
            const timestamp = Number(rawMessage.timestamp) || Date.now();

            if (!user || !text) return null;
            return { id, user, text, timestamp };
        }

        function dedupeMessages(messages) {
            const byId = new Map();

            for (const rawMessage of messages) {
                const msg = sanitizeMessage(rawMessage);
                if (!msg) continue;

                const existing = byId.get(msg.id);
                if (!existing || msg.timestamp > existing.timestamp) {
                    byId.set(msg.id, msg);
                }
            }

            return [...byId.values()]
                .sort((a, b) => a.timestamp - b.timestamp)
                .slice(-MAX_MESSAGES);
        }

        function sanitizeState(rawState) {
            const safe = rawState && typeof rawState === 'object' ? rawState : {};
            const messages = Array.isArray(safe.messages) ? safe.messages : [];
            const presence = safe.presence && typeof safe.presence === 'object' ? safe.presence : {};
            const typing = safe.typing && typeof safe.typing === 'object' ? safe.typing : {};
            const roles = safe.roles && typeof safe.roles === 'object' ? safe.roles : {};
            const userPermissions = safe.userPermissions && typeof safe.userPermissions === 'object' ? safe.userPermissions : {};

            const cleanPresence = {};
            Object.keys(presence).forEach(name => {
                const trimmed = String(name).trim();
                const lastSeen = Number(presence[name]) || 0;
                if (trimmed && lastSeen > 0) {
                    cleanPresence[trimmed] = lastSeen;
                }
            });

            const cleanTyping = {};
            Object.keys(typing).forEach(name => {
                const trimmed = String(name).trim();
                const lastTypingAt = Number(typing[name]) || 0;
                if (trimmed && lastTypingAt > 0) {
                    cleanTyping[trimmed] = lastTypingAt;
                }
            });

            const cleanRoles = {};
            Object.keys(roles).forEach(name => {
                const trimmed = String(name).trim();
                if (!trimmed || isAdminUsername(trimmed)) return;
                const normalizedRole = normalizeRole(roles[name]);
                if (normalizedRole !== ROLE_MEMBER) {
                    cleanRoles[trimmed] = normalizedRole;
                }
            });

            const cleanUserPermissions = {};
            Object.keys(userPermissions).forEach(name => {
                const trimmed = String(name).trim();
                if (!trimmed || isAdminUsername(trimmed)) return;
                const rawPermissions = userPermissions[name];
                if (!rawPermissions || typeof rawPermissions !== 'object') return;
                if (typeof rawPermissions.canDeleteOwnMessages !== 'boolean') return;
                cleanUserPermissions[trimmed] = {
                    canDeleteOwnMessages: rawPermissions.canDeleteOwnMessages
                };
            });

            return {
                messages: dedupeMessages(messages),
                presence: cleanPresence,
                typing: cleanTyping,
                roles: cleanRoles,
                userPermissions: cleanUserPermissions,
                updatedAt: Number(safe.updatedAt) || 0,
                lastWriter: typeof safe.lastWriter === 'string' ? safe.lastWriter : ''
            };
        }

        function cloneState(state) {
            return JSON.parse(JSON.stringify(state));
        }

        function persistCache(state) {
            localStorage.setItem(CACHE_STATE_KEY, JSON.stringify(state));
        }

        function loadCachedState() {
            const raw = JSON.parse(localStorage.getItem(CACHE_STATE_KEY) || '{}');
            return sanitizeState(raw);
        }

        function getHiddenMessagesStorageKey() {
            return `${HIDDEN_MESSAGES_STORAGE_PREFIX}_${currentUser || 'guest'}`;
        }

        function loadHiddenMessages() {
            const raw = JSON.parse(localStorage.getItem(getHiddenMessagesStorageKey()) || '[]');
            hiddenMessageIds = new Set(Array.isArray(raw) ? raw : []);
        }

        function persistHiddenMessages() {
            localStorage.setItem(getHiddenMessagesStorageKey(), JSON.stringify([...hiddenMessageIds]));
        }

        function hideMessageForCurrentUser(messageId) {
            if (!messageId) return;
            if (!currentUserPermissions.canDeleteOwnMessages) return;
            hiddenMessageIds.add(messageId);
            persistHiddenMessages();
            renderMessages(localState.messages);
        }

        function clearAllMessagesForCurrentUser() {
            if (!currentUserPermissions.canDeleteOwnMessages) return;
            for (const message of localState.messages) {
                hiddenMessageIds.add(message.id);
            }
            for (const message of pendingMessages.values()) {
                hiddenMessageIds.add(message.id);
            }
            persistHiddenMessages();
            renderMessages(localState.messages);
        }

        function clearAllMessagesForEveryone() {
            if (!currentUserPermissions.canDeleteEveryone || !isCurrentUserAdmin || !isAdminUsername(currentUser)) return;

            const approved = window.confirm('Tüm sohbeti herkes için silmek istediğine emin misin?');
            if (!approved) return;

            pendingMessages.clear();
            hiddenMessageIds.clear();
            persistHiddenMessages();

            enqueueWrite(state => {
                state.messages = [];
                state.presence[currentUser] = Date.now();
                return state;
            });
        }

        function updateGroupInfo(onlineCount, statusText) {
            const currentUserLabel = formatUserDisplayName(currentUser);
            groupInfoEl.textContent = `Kullan\u0131c\u0131: ${currentUserLabel} | \u00c7evrimi\u00e7i: ${onlineCount}${statusText ? ` | ${statusText}` : ''}`;
        }

        function renderTypingIndicator(typingMap) {
            if (!typingIndicatorEl) return;

            const now = Date.now();
            const activeTypers = Object.entries(typingMap || {})
                .filter(([name, lastTypingAt]) => {
                    if (name === currentUser) return false;
                    return now - Number(lastTypingAt) <= TYPING_TIMEOUT_MS;
                })
                .map(([name]) => formatUserDisplayName(name))
                .sort((a, b) => a.localeCompare(b, 'tr'));

            if (activeTypers.length === 0) {
                typingIndicatorEl.textContent = '';
                return;
            }

            if (activeTypers.length === 1) {
                typingIndicatorEl.textContent = `${activeTypers[0]} yaziyor...`;
                return;
            }

            if (activeTypers.length === 2) {
                typingIndicatorEl.textContent = `${activeTypers[0]} ve ${activeTypers[1]} yaziyor...`;
                return;
            }

            typingIndicatorEl.textContent = `${activeTypers[0]} ve ${activeTypers.length - 1} kisi yaziyor...`;
        }

        function setRoleStatus(message, isError = false) {
            if (!roleStatusEl) return;
            roleStatusEl.textContent = message || '';
            roleStatusEl.style.color = isError ? '#b42318' : '#5a6173';
        }

        function getKnownUsers() {
            const knownUsers = new Set();
            Object.keys(getStoredUsers()).forEach(name => knownUsers.add(String(name).trim()));
            Object.keys(localState.presence || {}).forEach(name => knownUsers.add(String(name).trim()));
            (localState.messages || []).forEach(message => knownUsers.add(String(message.user || '').trim()));
            if (currentUser) knownUsers.add(currentUser);

            return [...knownUsers]
                .filter(name => Boolean(name))
                .sort((a, b) => a.localeCompare(b, 'tr'));
        }

        function syncRoleFormFromSelection() {
            if (!roleUserSelectEl || !roleSelectEl || !roleDeleteOwnEl || !roleSaveBtn) return;

            const selectedUser = roleUserSelectEl.value || '';
            if (!selectedUser) {
                roleSelectEl.value = ROLE_MEMBER;
                roleDeleteOwnEl.checked = true;
                roleSelectEl.disabled = true;
                roleDeleteOwnEl.disabled = true;
                roleSaveBtn.disabled = true;
                return;
            }

            roleSelectEl.disabled = false;
            roleDeleteOwnEl.disabled = false;
            roleSaveBtn.disabled = false;

            const role = getUserRole(selectedUser);
            const permissions = getUserPermissions(selectedUser);
            roleSelectEl.value = role === ROLE_ADMIN ? ROLE_MEMBER : role;
            roleDeleteOwnEl.checked = Boolean(permissions.canDeleteOwnMessages);
        }

        function renderRoleManager() {
            if (!roleAdminPanelEl || !roleUserSelectEl) return;

            if (!canCurrentUserManageRoles()) {
                roleAdminPanelEl.style.display = 'none';
                return;
            }

            roleAdminPanelEl.style.display = 'block';

            const knownUsers = getKnownUsers().filter(name => !isAdminUsername(name));
            const previousValue = roleUserSelectEl.value;
            roleUserSelectEl.innerHTML = '';
            knownUsers.forEach(name => {
                const option = document.createElement('option');
                option.value = name;
                option.textContent = name;
                roleUserSelectEl.appendChild(option);
            });

            if (knownUsers.length === 0) {
                roleUserSelectEl.innerHTML = '<option value="">Kullanici yok</option>';
                roleUserSelectEl.value = '';
            } else if (knownUsers.includes(previousValue)) {
                roleUserSelectEl.value = previousValue;
            } else {
                roleUserSelectEl.value = knownUsers[0];
            }

            syncRoleFormFromSelection();
        }

        function saveRoleAndPermissions() {
            if (!canCurrentUserManageRoles()) {
                setRoleStatus('Bu alana sadece admin erisebilir.', true);
                return;
            }

            const targetUser = roleUserSelectEl ? roleUserSelectEl.value : '';
            if (!targetUser) {
                setRoleStatus('Rol verilecek bir kullanici sec.', true);
                return;
            }
            if (isAdminUsername(targetUser)) {
                setRoleStatus('Admin rolu degistirilemez.', true);
                return;
            }

            const nextRole = normalizeRole(roleSelectEl ? roleSelectEl.value : ROLE_MEMBER);
            const canDeleteOwnMessages = Boolean(roleDeleteOwnEl && roleDeleteOwnEl.checked);

            enqueueWrite(state => {
                if (!state.roles || typeof state.roles !== 'object') {
                    state.roles = {};
                }
                if (!state.userPermissions || typeof state.userPermissions !== 'object') {
                    state.userPermissions = {};
                }

                const roleTargetKey = findMatchingUsernameKey(state.roles, targetUser) || targetUser;
                Object.keys(state.roles).forEach(existingName => {
                    if (
                        existingName !== roleTargetKey &&
                        normalizeUsernameForCompare(existingName) === normalizeUsernameForCompare(targetUser)
                    ) {
                        delete state.roles[existingName];
                    }
                });

                if (nextRole === ROLE_MEMBER) {
                    delete state.roles[roleTargetKey];
                } else {
                    state.roles[roleTargetKey] = nextRole;
                }

                const permissionTargetKey = findMatchingUsernameKey(state.userPermissions, targetUser) || targetUser;
                Object.keys(state.userPermissions).forEach(existingName => {
                    if (
                        existingName !== permissionTargetKey &&
                        normalizeUsernameForCompare(existingName) === normalizeUsernameForCompare(targetUser)
                    ) {
                        delete state.userPermissions[existingName];
                    }
                });

                const baseDeleteOwn = getRolePermissions(nextRole).canDeleteOwnMessages;
                if (canDeleteOwnMessages === baseDeleteOwn) {
                    delete state.userPermissions[permissionTargetKey];
                } else {
                    state.userPermissions[permissionTargetKey] = { canDeleteOwnMessages };
                }

                state.presence[currentUser] = Date.now();
                return state;
            });

            setRoleStatus(`${targetUser} icin rol/yetki guncellemesi kaydedildi.`);
        }

        function renderMessages(messages) {
            const visibleMessages = messages.filter(msg => !hiddenMessageIds.has(msg.id));
            if (!visibleMessages.length) {
                messagesContainer.innerHTML = '<div class="no-messages">Mesaj yok. &#304;lk mesaj&#305; yazarak ba&#351;la!</div>';
                return;
            }

            messagesContainer.innerHTML = visibleMessages.map(msg => `
                <div class="message ${msg.user === currentUser ? 'own' : ''}">
                    <div class="message-bubble">
                        <div class="message-user">${escapeHtml(formatUserDisplayName(msg.user))}</div>
                        <div class="message-content">${escapeHtml(msg.text)}</div>
                        <div class="message-actions">
                            <div class="message-time">${new Date(msg.timestamp).toLocaleTimeString('tr-TR')}</div>
                            ${msg.user === currentUser && currentUserPermissions.canDeleteOwnMessages ? `<button class="message-delete-btn" data-delete-id="${encodeURIComponent(msg.id)}" type="button" title="Sadece senden silinir">Sil</button>` : ''}
                        </div>
                    </div>
                </div>
            `).join('');

            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function renderOnlineUsers(presenceMap, statusText) {
            const now = Date.now();
            const onlineUsers = Object.entries(presenceMap)
                .filter(([, lastSeen]) => now - Number(lastSeen) <= PRESENCE_TIMEOUT_MS)
                .map(([name]) => name)
                .sort((a, b) => a.localeCompare(b, 'tr'));

            if (!onlineUsers.length) {
                onlineUsersDiv.innerHTML = '<h3>Kimse &#231;evrimi&#231;i de&#287;il</h3>';
                updateGroupInfo(0, statusText);
                return;
            }

            onlineUsersDiv.innerHTML = '<h3>&#199;evrimi&#231;i</h3>' + onlineUsers.map(user => `
                <div class="user-item">
                    <span>${escapeHtml(formatUserDisplayName(user))}</span>
                    <div class="user-status status-online">&#199;evrimi&#231;i</div>
                </div>
            `).join('');

            updateGroupInfo(onlineUsers.length, statusText);
        }

        async function fetchRemoteState() {
            const snap = await getDoc(stateDocRef);
            if (!snap.exists()) {
                return sanitizeState({});
            }
            return sanitizeState(snap.data());
        }

        async function pushRemoteState(state) {
            await setDoc(stateDocRef, state);
        }

        function reconcileState(remoteState, statusText = '') {
            const remote = sanitizeState(remoteState);
            const remoteIds = new Set(remote.messages.map(msg => msg.id));

            for (const pendingId of [...pendingMessages.keys()]) {
                if (remoteIds.has(pendingId)) {
                    pendingMessages.delete(pendingId);
                }
            }

            const mergedMessages = dedupeMessages([...remote.messages, ...pendingMessages.values()]);

            localState = {
                ...remote,
                messages: mergedMessages
            };

            refreshCurrentUserPermissions();
            applyAdminControls();
            renderRoleManager();
            persistCache(localState);
            renderMessages(localState.messages);
            renderOnlineUsers(localState.presence, statusText);
            renderTypingIndicator(localState.typing);

            if (pendingMessages.size > 0) {
                flushPendingMessages();
            }
        }

        function setTypingState(isTyping, force = false) {
            const now = Date.now();
            if (!force && isTyping) {
                if (isCurrentUserTyping && now - lastTypingWriteAt < TYPING_WRITE_THROTTLE_MS) {
                    return;
                }
            }

            if (!force && !isTyping && !isCurrentUserTyping) {
                return;
            }

            isCurrentUserTyping = isTyping;
            lastTypingWriteAt = now;

            enqueueWrite(state => {
                if (!state.typing || typeof state.typing !== 'object') {
                    state.typing = {};
                }

                if (isTyping) {
                    state.typing[currentUser] = now;
                } else {
                    delete state.typing[currentUser];
                }

                state.presence[currentUser] = now;
                return state;
            });
        }

        function enqueueWrite(mutator) {
            writeQueue = writeQueue
                .then(async () => {
                    let remote;
                    try {
                        remote = await fetchRemoteState();
                    } catch (_) {
                        remote = localState;
                    }

                    const base = sanitizeState(remote);
                    const next = sanitizeState(mutator(cloneState(base)) || base);
                    next.updatedAt = Date.now();
                    next.lastWriter = currentUser;

                    await pushRemoteState(next);
                    reconcileState(next, 'Buluta ba\u011fl\u0131');
                })
                .catch(error => {
                    console.error('Write queue error:', error);
                    renderOnlineUsers(localState.presence, 'Ba\u011flant\u0131 sorunu');
                });

            return writeQueue;
        }

        function flushPendingMessages() {
            if (pendingMessages.size === 0) return;

            enqueueWrite(state => {
                state.messages = dedupeMessages([...state.messages, ...pendingMessages.values()]);
                state.presence[currentUser] = Date.now();
                return state;
            });
        }

        function sendMessage() {
            const messageText = normalizeMessageText(messageInput.value);
            if (!messageText) return;

            const message = {
                id: createMessageId(),
                user: currentUser,
                text: messageText,
                timestamp: Date.now()
            };

            pendingMessages.set(message.id, message);
            localState.messages = dedupeMessages([...localState.messages, message]);
            renderMessages(localState.messages);
            messageInput.value = '';
            if (typingStopTimer) {
                clearTimeout(typingStopTimer);
                typingStopTimer = null;
            }
            setTypingState(false, true);

            flushPendingMessages();
        }

        function writePresenceIfNeeded(force = false) {
            const now = Date.now();
            if (!force && now - lastPresenceWriteAt < HEARTBEAT_INTERVAL_MS) {
                return;
            }

            lastPresenceWriteAt = now;
            enqueueWrite(state => {
                state.presence[currentUser] = now;
                return state;
            });
        }

        async function pollRemoteState() {
            if (isPolling) return;
            isPolling = true;

            try {
                const remote = await fetchRemoteState();
                reconcileState(remote, 'Buluta ba\u011fl\u0131');
                writePresenceIfNeeded(false);
            } catch (error) {
                console.error('Poll error:', error);
                renderMessages(localState.messages);
                renderOnlineUsers(localState.presence, 'Ba\u011flant\u0131 sorunu');
            } finally {
                isPolling = false;
            }
        }

        function setupInputHandlers() {
            messageInput.addEventListener('keypress', event => {
                if (event.key === 'Enter') {
                    sendMessage();
                }
            });

            messageInput.addEventListener('input', () => {
                const hasContent = Boolean(normalizeMessageText(messageInput.value));
                if (!hasContent) {
                    if (typingStopTimer) {
                        clearTimeout(typingStopTimer);
                        typingStopTimer = null;
                    }
                    setTypingState(false, true);
                    return;
                }

                setTypingState(true, false);
                if (typingStopTimer) {
                    clearTimeout(typingStopTimer);
                }
                typingStopTimer = setTimeout(() => {
                    setTypingState(false, true);
                    typingStopTimer = null;
                }, TYPING_TIMEOUT_MS);
            });

            messageInput.addEventListener('blur', () => {
                if (typingStopTimer) {
                    clearTimeout(typingStopTimer);
                    typingStopTimer = null;
                }
                setTypingState(false, true);
            });

            if (roleUserSelectEl) {
                roleUserSelectEl.addEventListener('change', () => {
                    syncRoleFormFromSelection();
                    setRoleStatus('');
                });
            }

            if (roleSaveBtn) {
                roleSaveBtn.addEventListener('click', saveRoleAndPermissions);
            }

            messagesContainer.addEventListener('click', event => {
                const deleteBtn = event.target.closest('.message-delete-btn');
                if (!deleteBtn) return;

                const encodedId = deleteBtn.getAttribute('data-delete-id') || '';
                let messageId = encodedId;
                try {
                    messageId = decodeURIComponent(encodedId);
                } catch (_) {
                    // no-op
                }

                hideMessageForCurrentUser(messageId);
            });
        }

        function goBack() {
            window.location.href = 'dashboard/home.html';
        }

        function logout() {
            setTypingState(false, true);
            sessionStorage.removeItem('nexusOS_loggedUser');
            sessionStorage.removeItem('nexusOS_isAdmin');
            localStorage.removeItem('nexusOS_loggedUser');
            localStorage.removeItem('nexusOS_isAdmin');
            window.location.href = 'index.html';
        }

        function initChat() {
            checkUserLogin();
            currentUser = getCurrentUser();
            isCurrentUserAdmin = computeIsCurrentUserAdmin();
            loadHiddenMessages();
            refreshCurrentUserPermissions();
            applyAdminControls();
            renderRoleManager();

            localState = loadCachedState();
            reconcileState(localState, 'Ba\u011flan\u0131yor...');

            setupInputHandlers();
            writePresenceIfNeeded(true);
            pollRemoteState();

            pollHandle = setInterval(() => {
                pollRemoteState();
            }, POLL_INTERVAL_MS);

            window.addEventListener('beforeunload', () => {
                if (pollHandle) {
                    clearInterval(pollHandle);
                }
            });
        }

        window.sendMessage = sendMessage;
        window.hideMessageForCurrentUser = hideMessageForCurrentUser;
        window.clearAllMessagesForCurrentUser = clearAllMessagesForCurrentUser;
        window.clearAllMessagesForEveryone = clearAllMessagesForEveryone;
        window.goBack = goBack;
        window.logout = logout;

        initChat();
    
        window.sendMessage = sendMessage;
        window.clearLocalChat = clearLocalChat;
        window.clearGlobalChat = clearGlobalChat;
        window.saveRoles = saveRoles;
        window.applyDemotion = applyDemotion;
        window.hideMessageForCurrentUser = hideMessageForCurrentUser;
        </script>
</body>
</html>
